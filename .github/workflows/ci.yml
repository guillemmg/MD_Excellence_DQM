# ══════════════════════════════════════════════════════════════════════════════
# CI Workflow — DQM Rule SQL Validation
# Triggers on every PR that modifies any logic.sql file
# Connects to Snowflake and validates SQL via EXPLAIN + column check
# ══════════════════════════════════════════════════════════════════════════════
name: DQM Rule CI — SQL Validation

on:
  pull_request:
    paths:
      - "rules/**/logic.sql"   # Only triggers when a logic.sql changes

jobs:
  validate-sql:
    name: Validate changed SQL rules
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the PR branch ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed to detect changed files

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install snowflake-connector-python pandas

      # ── 4. Detect which logic.sql files changed in this PR ────────────────
      - name: Detect changed SQL files
        id: changed
        run: |
          # Compare PR branch against base branch to find changed logic.sql files
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
                    | grep 'rules/.*/logic.sql' || true)
          echo "Changed files:"
          echo "$CHANGED"
          # Save as multiline env variable for next step
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED"  >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      # ── 5. Validate each changed SQL file against Snowflake ───────────────
      - name: Validate SQL via Snowflake EXPLAIN
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          CHANGED_FILES:       ${{ steps.changed.outputs.files }}
        run: |
          python - <<'EOF'
          import os
          import sys
          import snowflake.connector

          # Required output columns every rule SQL must expose
          REQUIRED_COLS = {"ATTRIBUTE", "SOURCE_SYSTEM", "GMID", "COMPLETENESS", "ACCURACY"}

          changed_raw = os.environ.get("CHANGED_FILES", "").strip()
          if not changed_raw:
              print("No logic.sql files changed in this PR — skipping validation.")
              sys.exit(0)

          changed_files = [f.strip() for f in changed_raw.splitlines() if f.strip()]
          print(f"Files to validate: {len(changed_files)}")
          print("=" * 60)

          # Connect to Snowflake
          conn = snowflake.connector.connect(
              account   = os.environ["SNOWFLAKE_ACCOUNT"],
              user      = os.environ["SNOWFLAKE_USER"],
              password  = os.environ["SNOWFLAKE_PASSWORD"],
              role      = os.environ["SNOWFLAKE_ROLE"],
              warehouse = os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cur = conn.cursor()

          errors   = []
          validated = 0

          for filepath in changed_files:
              # Extract attribute name from path: rules/APLFZ/logic.sql → APLFZ
              attr = filepath.split("/")[1]
              print(f"\n  [{attr}]  {filepath}")

              try:
                  sql = open(filepath).read().strip()
                  if not sql:
                      errors.append(f"[{attr}] logic.sql is empty")
                      continue

                  # ── EXPLAIN: validates SQL syntax and table references ────
                  cur.execute(f"EXPLAIN {sql}")
                  print(f"    ✅  EXPLAIN passed")

                  # ── Column check: required output columns present ─────────
                  cur.execute(f"SELECT * FROM ({sql}) _ci LIMIT 0")
                  found_cols = {d[0].upper() for d in cur.description}
                  missing    = REQUIRED_COLS - found_cols
                  if missing:
                      errors.append(
                          f"[{attr}] Missing required columns: {', '.join(sorted(missing))} "
                          f"| Found: {', '.join(sorted(found_cols))}"
                      )
                      print(f"    ❌  Missing columns: {', '.join(sorted(missing))}")
                  else:
                      print(f"    ✅  Required columns present: {', '.join(sorted(found_cols))}")
                      validated += 1

              except Exception as exc:
                  err = str(exc)[:300]
                  errors.append(f"[{attr}] {err}")
                  print(f"    ❌  ERROR: {err}")

          cur.close()
          conn.close()

          # ── Final summary ────────────────────────────────────────────────
          print(f"\n{'='*60}")
          print(f"  Validated : {validated}")
          print(f"  Errors    : {len(errors)}")
          print(f"{'='*60}")

          if errors:
              print("\nFAILED — fix these errors before merging:\n")
              for e in errors:
                  print(f"  ✗  {e}")
              sys.exit(1)   # Blocks the PR
          else:
              print("\nAll SQL rules passed validation ✅")
              sys.exit(0)   # PR can be merged
          EOF
